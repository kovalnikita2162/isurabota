<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}GraphLab{% endblock %}</title>
  <link rel="icon" href="{{ url_for('static', filename='favicon.png') }}" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            pink:  { DEFAULT: '#ff375f', glow: 'rgba(255,55,95,0.35)' },
            blue:  { DEFAULT: '#0a84ff', glow: 'rgba(10,132,255,0.35)' },
            glass: 'rgba(255,255,255,0.04)',
          },
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          backdropBlur: { glass: '24px' },
        }
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="font-sans bg-[#080810] text-white {% block body_class %}{% endblock %}">
  {% block body %}{% endblock %}
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
