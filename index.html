<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algorithm Visualizer | Premium</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        dark: '#0a0a0c',
                        neonPink: '#ff2a5f',
                        electricBlue: '#00e5ff',
                        glass: 'rgba(255, 255, 255, 0.05)',
                    }
                }
            }
        }
    </script>

    <!-- vis.js -->
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

    <style>
        body { background-color: #0a0a0c; color: white; overflow: hidden; margin: 0; }
        #network-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        .glass-panel {
            background: rgba(20, 20, 25, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .btn-active { background: rgba(255, 255, 255, 0.15); border-color: rgba(255, 255, 255, 0.3); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-log { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="antialiased font-sans">

    <div id="network-container"></div>

    <!-- Side Drawer -->
    <div class="absolute right-6 top-6 bottom-32 w-80 glass-panel rounded-3xl z-10 flex flex-col overflow-hidden shadow-2xl">
        <div class="px-6 py-5 border-b border-white/10 bg-white/5">
            <div class="flex justify-between items-center">
                <h2 class="text-lg font-semibold flex items-center gap-2">
                    <div id="status-indicator" class="w-2 h-2 rounded-full bg-gray-500"></div>
                    Логи анализа
                </h2>
                <button onclick="clearLogs()" class="text-[10px] text-gray-500 hover:text-white uppercase tracking-tighter">Очистить</button>
            </div>
            <p class="text-[10px] text-gray-400 uppercase tracking-widest mt-1 font-medium">Core Engine: analyze_graph()</p>
        </div>
        <div id="logs-container" class="flex-1 p-4 overflow-y-auto no-scrollbar flex flex-col gap-3">
            <div class="text-sm text-gray-500 text-center mt-10 italic">Нажмите на алгоритм для запуска...</div>
        </div>
    </div>

    <!-- Bottom Control Bar -->
    <div class="absolute bottom-8 left-1/2 -translate-x-1/2 glass-panel rounded-2xl p-2 z-10 flex gap-2 shadow-2xl border-white/5">
        <button onclick="runAlgorithm('dfs')" class="alg-btn px-6 py-3 rounded-xl text-sm font-medium text-gray-300 hover:text-white transition-all">DFS</button>
        <button onclick="runAlgorithm('bfs')" class="alg-btn px-6 py-3 rounded-xl text-sm font-medium text-gray-300 hover:text-white transition-all">BFS</button>
        <button onclick="runAlgorithm('dijkstra')" class="alg-btn px-6 py-3 rounded-xl text-sm font-medium text-gray-300 hover:text-white transition-all">Дейкстра</button>
        <button onclick="runAlgorithm('coloring')" class="alg-btn px-6 py-3 rounded-xl text-sm font-medium text-gray-300 hover:text-white transition-all">Раскраска</button>
    </div>

    <!-- API Config UI (Hidden by default, used for debugging) -->
    <div class="absolute top-6 left-6 z-10 flex gap-2">
        <input id="api-url-input" type="text" value="http://localhost:8000/analyze" 
               class="bg-white/5 border border-white/10 rounded-lg px-3 py-1 text-[10px] w-48 focus:outline-none focus:border-electricBlue transition-all text-gray-400"
               placeholder="API URL">
    </div>

    <script>
        const COLOR_MALE = '#00e5ff';
        const COLOR_FEMALE = '#ff2a5f';

        const rawNodes = [
            { id: 0, label: "Никита", gender: 'M', image: "https://i.pravatar.cc/150?img=11" },
            { id: 1, label: "Маша", gender: 'F', image: "https://i.pravatar.cc/150?img=5" },
            { id: 2, label: "Алексей", gender: 'M', image: "https://i.pravatar.cc/150?img=13" },
            { id: 3, label: "Катя", gender: 'F', image: "https://i.pravatar.cc/150?img=9" },
            { id: 4, label: "Дмитрий", gender: 'M', image: "https://i.pravatar.cc/150?img=15" },
            { id: 5, label: "Оля", gender: 'F', image: "https://i.pravatar.cc/150?img=20" },
        ];

        const edgesData = [
            { from: 0, to: 1 }, { from: 0, to: 2 }, { from: 1, to: 3 }, 
            { from: 2, to: 4 }, { from: 3, to: 5 }, { from: 4, to: 5 }, { from: 1, to: 4 }
        ];

        const nodes = new vis.DataSet(rawNodes.map(n => ({
            ...n, shape: 'circularImage', size: 35, borderWidth: 3,
            color: { border: n.gender === 'M' ? COLOR_MALE : COLOR_FEMALE, background: '#1a1a1a' },
            font: { color: '#fff', size: 12, face: 'Inter' }
        })));
        const edges = new vis.DataSet(edgesData.map(e => ({ ...e, color: 'rgba(255,255,255,0.1)' })));

        const network = new vis.Network(document.getElementById('network-container'), { nodes, edges }, {
            physics: { solver: 'forceAtlas2Based', stabilization: true },
            interaction: { hover: true, selectConnectedEdges: false }
        });

        function getAdjacencyMatrix() {
            const size = rawNodes.length;
            const matrix = Array(size).fill(0).map(() => Array(size).fill(0));
            edgesData.forEach(e => {
                matrix[e.from][e.to] = 1;
                matrix[e.to][e.from] = 1;
            });
            return matrix;
        }

        let animationActive = false;
        let abortCtrl = null;

        async function runAlgorithm(type) {
            if (animationActive) {
                abortCtrl.abort();
                await new Promise(r => setTimeout(r, 100));
            }
            abortCtrl = new AbortController();
            animationActive = true;

            const API_URL = document.getElementById('api-url-input').value;
            const indicator = document.getElementById('status-indicator');
            indicator.className = 'w-2 h-2 rounded-full bg-yellow-500 animate-pulse';
            
            clearLogs();
            resetGraphStyles();

            try {
                addLog({ log_message: `🚀 Отправка данных на ${API_URL}...` }, "text-gray-500");

                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        matrix: getAdjacencyMatrix(),
                        start_vertex: 0
                    }),
                    signal: abortCtrl.signal
                });

                if (response.status === 404) {
                    throw new Error("404 Not Found: Проверьте эндпоинт на сервере (например, / или /analyze)");
                }

                const data = await response.json();
                
                if (data.status === 'success') {
                    indicator.className = 'w-2 h-2 rounded-full bg-green-500';
                    
                    // Фильтруем логи по типу алгоритма, так как analyze_graph возвращает всё сразу
                    const filteredLogs = filterLogsByType(data.logs, type);
                    
                    if (filteredLogs.length === 0) {
                        addLog({ log_message: "⚠️ Логи для этого алгоритма не найдены в ответе сервера." }, "text-orange-400");
                    }

                    for (const step of filteredLogs) {
                        if (abortCtrl.signal.aborted) break;
                        await processStep(step);
                        await new Promise(r => setTimeout(r, 1000));
                    }

                    // Применяем финальные результаты
                    if (type === 'coloring' && data.detailed_results.graph_coloring) {
                        applyFinalColoring(data.detailed_results.graph_coloring);
                    }
                    if (type === 'dijkstra' && data.detailed_results.shortest_paths) {
                        addLog({ log_message: "✅ Пути рассчитаны. Проверьте детали в консоли или интерфейсе." }, "text-green-400");
                    }

                    addLog({ log_message: "🏁 Визуализация завершена" }, "text-gray-500 italic");
                } else {
                    addLog({ log_message: `❌ Ошибка: ${data.final_result}` }, "text-red-400");
                }
            } catch (e) {
                if (e.name !== 'AbortError') {
                    addLog({ log_message: `🚫 ${e.message}` }, "text-red-500 font-bold");
                    indicator.className = 'w-2 h-2 rounded-full bg-red-500';
                }
            } finally {
                animationActive = false;
            }
        }

        // Твой питон-код добавляет префиксы с эмодзи. Используем их для фильтрации логов.
        function filterLogsByType(logs, type) {
            const map = {
                'dfs': '🌲 DFS',
                'bfs': '🌊 BFS',
                'dijkstra': '🛣️',
                'coloring': '🎨'
            };
            const prefix = map[type];
            // Также оставляем общие сообщения вроде "🚀 Начинаем" или "✅"
            return logs.filter(log => 
                log.log_message.includes(prefix) || 
                log.log_message.includes("🚀") || 
                log.log_message.includes("✅")
            );
        }

        async function processStep(step) {
            addLog(step);
            
            const updates = rawNodes.map(n => {
                const isActive = n.id === step.active_node;
                const isVisited = step.visited_nodes && step.visited_nodes.includes(n.id);
                return {
                    id: n.id,
                    size: isActive ? 55 : 35,
                    borderWidth: isActive ? 6 : 3,
                    opacity: isVisited || isActive ? 1 : 0.3,
                    shadow: { enabled: isActive, color: '#fff', size: 25 }
                };
            });
            nodes.update(updates);

            if (step.active_node !== null && step.active_node !== undefined) {
                network.focus(step.active_node, { scale: 1.1, animation: { duration: 500 } });
            }
        }

        function applyFinalColoring(coloringMap) {
            const palette = ['#ff2a5f', '#00e5ff', '#bcff00', '#ff9100', '#9d00ff', '#00ffaa'];
            const updates = Object.entries(coloringMap).map(([nodeId, colorIdx]) => ({
                id: parseInt(nodeId),
                color: { border: palette[colorIdx % palette.length] },
                size: 40,
                opacity: 1
            }));
            nodes.update(updates);
            addLog({ log_message: "🎨 Граф успешно раскрашен!" }, "text-electricBlue font-bold");
        }

        function addLog(step, customClass = "") {
            const container = document.getElementById('logs-container');
            const log = document.createElement('div');
            log.className = `glass-panel rounded-xl p-3 text-xs animate-log shadow-sm border-white/5 ${customClass}`;
            
            let stateInfo = "";
            if (step.state_data) {
                const data = step.state_data;
                const badges = [];
                if (data.stack) badges.push(`<span class="bg-neonPink/20 text-neonPink px-1.5 rounded">Stack: ${data.stack.length}</span>`);
                if (data.queue) badges.push(`<span class="bg-electricBlue/20 text-electricBlue px-1.5 rounded">Queue: ${data.queue.length}</span>`);
                if (data.depth !== undefined) badges.push(`<span class="bg-white/10 text-gray-300 px-1.5 rounded">Depth: ${data.depth}</span>`);
                
                if (badges.length > 0) {
                    stateInfo = `<div class="mt-2 flex gap-1 flex-wrap text-[9px] font-mono">${badges.join('')}</div>`;
                }
            }

            log.innerHTML = `
                <div class="flex justify-between items-start mb-1">
                    <span class="opacity-50 font-bold uppercase text-[9px] tracking-tighter">
                        ${step.step ? `Шаг ${step.step}` : 'INFO'}
                    </span>
                </div>
                <div class="text-gray-200 leading-relaxed">${step.log_message}</div>
                ${stateInfo}
            `;
            container.appendChild(log);
            container.scrollTop = container.scrollHeight;
        }

        function resetGraphStyles() {
            nodes.update(rawNodes.map(n => ({ 
                id: n.id, size: 35, borderWidth: 3, opacity: 1,
                color: { border: n.gender === 'M' ? COLOR_MALE : COLOR_FEMALE }
            })));
        }

        function clearLogs() {
            document.getElementById('logs-container').innerHTML = '<div class="text-sm text-gray-500 text-center mt-10 italic">Логи очищены.</div>';
        }
    </script>
</body>
</html>
